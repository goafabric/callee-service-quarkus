#web
quarkus.http.port=50900
quarkus.http.io-threads=20
#quarkus.vertx.worker-pool-size=

#monitoring
quarkus.smallrye-health.root-path=/actuator/health
quarkus.micrometer.export.prometheus.path=/actuator/prometheus
quarkus.swagger-ui.always-include=true

#jaeger
quarkus.jaeger.enabled=true
quarkus.jaeger.sampler-type=probabilistic
quarkus.jaeger.sampler-param=1
quarkus.jaeger.propagation=b3

quarkus.jaeger.service-name=callee-service
quarkus.jaeger.endpoint=http://localhost:14268/api/traces

quarkus.log.category."io.jaegertracing".level=ERROR

#security
security.authentication.enabled=false
%test.security.authentication.enabled=false

quarkus.oidc.application-type=hybrid
quarkus.oidc.roles.source=accesstoken

quarkus.oidc.client-id=oauth2-proxy
quarkus.oidc.credentials.client-secret.value=none
#quarkus.oidc.auth-server-url=http://localhost:30200
quarkus.oidc.auth-server-url=http://localhost:30200/oidc/realms/tenant-TENANT_ID

#logging
quarkus.log.level=INFO

quarkus.log.category."org.goafabric".level=INFO
quarkus.log.category."org.flywaydb.core".level=INFO
quarkus.log.category."org.hibernate".level=INFO